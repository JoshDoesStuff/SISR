components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:5746/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    SteamStatusBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:5746/schemas/SteamStatusBody.json
          format: uri
          readOnly: true
          type: string
        cef_debug_enabled:
          type: boolean
        cef_debug_reachable:
          type: boolean
        launched_via_steam:
          type: boolean
        steam_app_id:
          format: int32
          minimum: 0
          type: integer
        steam_game_id:
          type: string
        steam_path:
          type: string
        steam_running:
          type: boolean
      required:
        - steam_running
        - steam_path
        - cef_debug_enabled
        - cef_debug_reachable
        - launched_via_steam
        - steam_game_id
        - steam_app_id
      type: object
info:
  title: SISR API
  version: v0.4.2-77-gb20106a
openapi: 3.1.0
paths:
  /api/v1/shutdown:
    post:
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
  /api/v1/steam_status:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SteamStatusBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
servers:
  - description: SISR API
    url: http://127.0.0.1:5746
