components:
  schemas:
    APIDevice:
      additionalProperties: false
      properties:
        real_device:
          $ref: "#/components/schemas/APIGamepad"
        steam_virtual_device:
          $ref: "#/components/schemas/APIGamepad"
        viiper_device:
          $ref: "#/components/schemas/Device"
      type: object
    APIGamepad:
      additionalProperties: false
      properties:
        id:
          format: int32
          type: integer
        name:
          type: string
        path:
          type: string
        player_index:
          format: int64
          type: integer
        real_type:
          type: string
        serial:
          type: string
        steam_handle:
          type: string
        type:
          type: string
      required:
        - id
        - name
        - player_index
      type: object
    AutoUpdate:
      additionalProperties: false
      properties:
        UpdateNotify:
          default: stable
          enum:
            - none
            - stable
            - prerelease
            - always
          type: string
      required:
        - UpdateNotify
      type: object
    Config:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:5746/schemas/Config.json
          format: uri
          readOnly: true
          type: string
        autoUpdate:
          $ref: "#/components/schemas/AutoUpdate"
        controllerEmulation:
          $ref: "#/components/schemas/ControllerEmulation"
        keyboardMouseEmulation:
          $ref: "#/components/schemas/KeyboardMouseEmulation"
        runMisc:
          $ref: "#/components/schemas/RunMisc"
        steam:
          $ref: "#/components/schemas/Steam"
        viiper:
          $ref: "#/components/schemas/Viiper"
        window:
          $ref: "#/components/schemas/Window"
      required:
        - autoUpdate
        - runMisc
        - controllerEmulation
        - keyboardMouseEmulation
        - viiper
        - window
        - steam
      type: object
    ControllerEmulation:
      additionalProperties: false
      properties:
        AllowSteamDesktopLayout:
          default: false
          type: boolean
        DefaultControllerType:
          default: xbox360
          enum:
            - xbox360
            - dualshock4
          type: string
        GyroPassthrough:
          default: true
          type: boolean
      required:
        - DefaultControllerType
        - GyroPassthrough
        - AllowSteamDesktopLayout
      type: object
    Device:
      additionalProperties: false
      properties:
        busId:
          format: int32
          minimum: 0
          type: integer
        devId:
          type: string
        deviceSpecific:
          additionalProperties: {}
          type: object
        pid:
          type: string
        type:
          type: string
        vid:
          type: string
      required:
        - busId
        - devId
        - vid
        - pid
        - type
        - deviceSpecific
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:5746/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    InitialLaunch:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:5746/schemas/InitialLaunch.json
          format: uri
          readOnly: true
          type: string
        is_initial_launch:
          type: boolean
      required:
        - is_initial_launch
      type: object
    KeyboardMouseEmulation:
      additionalProperties: false
      properties:
        KeyboardMouseEmulation:
          default: false
          type: boolean
      required:
        - KeyboardMouseEmulation
      type: object
    OverlayChanged:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:5746/schemas/OverlayChanged.json
          format: uri
          readOnly: true
          type: string
        open:
          type: boolean
      required:
        - open
      type: object
    PingResponse:
      additionalProperties: false
      properties:
        server:
          type: string
        version:
          type: string
      required:
        - server
        - version
      type: object
    RunMisc:
      additionalProperties: false
      properties:
        InitialLaunch:
          default: false
          type: boolean
        NoSteam:
          default: false
          type: boolean
      required:
        - NoSteam
        - InitialLaunch
      type: object
    ShowHideUI:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:5746/schemas/ShowHideUI.json
          format: uri
          readOnly: true
          type: string
        show:
          type: boolean
      required:
        - show
      type: object
    Steam:
      additionalProperties: false
      properties:
        CEFRemoteDebugPort:
          format: int32
          minimum: 0
          type: integer
        InstallDir:
          type: string
        UserID:
          format: int32
          minimum: 0
          type: integer
      required:
        - InstallDir
        - UserID
        - CEFRemoteDebugPort
      type: object
    SteamAndCefStatus:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:5746/schemas/SteamAndCefStatus.json
          format: uri
          readOnly: true
          type: string
        cef_debug_enabled:
          type: boolean
        cef_debug_reachable:
          type: boolean
        launched_via_steam:
          type: boolean
        marker_shortcut_present:
          description: indicator if the SISR marker is present, always true when launched via Steam (due to it not being necessary)
          type: boolean
        no_steam_mode:
          type: boolean
        steam_app_id:
          format: int32
          minimum: 0
          type: integer
        steam_game_id:
          type: string
        steam_path:
          type: string
        steam_running:
          type: boolean
      required:
        - steam_running
        - steam_path
        - cef_debug_enabled
        - cef_debug_reachable
        - marker_shortcut_present
        - no_steam_mode
        - launched_via_steam
        - steam_game_id
        - steam_app_id
      type: object
    VIIPERStatus:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:5746/schemas/VIIPERStatus.json
          format: uri
          readOnly: true
          type: string
        address:
          type: string
        status:
          $ref: "#/components/schemas/PingResponse"
      type: object
    VersionInfo:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://127.0.0.1:5746/schemas/VersionInfo.json
          format: uri
          readOnly: true
          type: string
        new_version:
          type: string
        update_available:
          type: boolean
        update_dismissed:
          type: boolean
        version:
          type: string
      required:
        - version
        - update_available
        - update_dismissed
      type: object
    Viiper:
      additionalProperties: false
      properties:
        Address:
          default: localhost:3242
          type: string
        Password:
          type: string
      required:
        - Address
        - Password
      type: object
    Window:
      additionalProperties: false
      properties:
        Fullscreen:
          default: true
          type: boolean
        MaxFPS:
          default: 60
          format: int32
          minimum: 0
          type: integer
        Show:
          default: false
          type: boolean
      required:
        - MaxFPS
        - Fullscreen
        - Show
      type: object
info:
  title: SISR API
  version: v0.4.2-107-gbf5a0b0
openapi: 3.1.0
paths:
  /api/v1/config:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Config"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
  /api/v1/devices:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/APIDevice"
                type:
                  - array
                  - "null"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
  /api/v1/initial_launch:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitialLaunch"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
    post:
      description: Writes the initial launch done file marker
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitialLaunch"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
  /api/v1/quit:
    post:
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
  /api/v1/steam/cef/inject-overlay-notifier:
    post:
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      tags:
        - steam
        - cef
        - inject
  /api/v1/steam/cef/overlay-state-changed:
    post:
      description: Callback for CEF Injectee when Steam overlay is opened/closed
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OverlayChanged"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      tags:
        - steam
        - cef
        - callback
  /api/v1/steam/status:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SteamAndCefStatus"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
  /api/v1/ui:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShowHideUI"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
  /api/v1/version/info:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
  /api/v1/version/install-update:
    post:
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
  /api/v1/version/skip-update:
    post:
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
  /api/v1/version/update-check:
    post:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
  /api/v1/version/update-remind-later:
    post:
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
  /api/v1/version/update-view-on-github:
    post:
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
  /api/v1/viiper/ping:
    post:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VIIPERStatus"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
  /api/v1/viiper/status:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VIIPERStatus"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
servers:
  - description: SISR API
    url: http://127.0.0.1:5746
