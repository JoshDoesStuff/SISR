name: SISR Build Base

on:
    workflow_call:
        inputs:
            artifact_suffix:
                required: false
                type: string
                default: ""
                description: "Suffix to add to artifact names"
            upload_artifacts:
                required: false
                type: boolean
                default: false
                description: "Whether to upload build artifacts"

jobs:
    test:
        name: Test
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest]
        steps:
            - name: Checkout code
              uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0
                  submodules: recursive

            - name: Setup Go
              uses: actions/setup-go@v6.4.0
              with:
                  go-version: stable
                  cache: true
                  cache-dependency-path: go.sum

            - name: Set up Node.js
              uses: actions/setup-node@v6.4.0
              with:
                  node-version: "25"
                  cache: npm
                  cache-dependency-path: |
                      CEF_Payloads/package-lock.json
                      UI/package-lock.json

            - name: CEF deps
              working-directory: CEF_Payloads
              run: npm ci

            - name: CEF build
              working-directory: CEF_Payloads
              run: npm run build

            - name: UI deps
              working-directory: UI
              run: npm ci

            - name: UI build
              working-directory: UI
              env:
                  PUBLIC_DEV: "0"
                  PUBLIC_LOG_LEVEL: info
              run: npm run build

            - name: Install build tools
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      build-essential ninja-build cmake pkg-config just \
                      libwebkitgtk-6.0-dev libgtk-4-dev libx11-dev

            - name: Install build tools
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  winget install -e --id Casey.Just --accept-package-agreements --accept-source-agreements

            - name: Normalize line endings
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  git config --global core.autocrlf false
                  git config --global core.eol lf
                  git reset --hard HEAD

            - name: Lint
              uses: golangci/golangci-lint-action@v9.2.0
              with:
                  version: latest
                  install-mode: goinstall

            - name: Run tests
              run: just test

    build:
        name: Build binaries (${{ matrix.target.name }})
        runs-on: ${{ matrix.target.os }}
        needs: test
        strategy:
            fail-fast: false
            matrix:
                target:
                    - {
                          name: "windows_x64",
                          os: "windows-latest",
                          goos: "windows",
                          goarch: "amd64",
                          ext: ".exe",
                      }
                    - {
                          name: "linux_x64",
                          os: "ubuntu-latest",
                          goos: "linux",
                          goarch: "amd64",
                          ext: "",
                      }
                    - {
                          name: "linux_arm64",
                          os: "ubuntu-24.04-arm",
                          goos: "linux",
                          goarch: "arm64",
                          ext: "",
                      }

        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0
                  submodules: recursive

            - name: Setup Go
              uses: actions/setup-go@v6.4.0
              with:
                  go-version: stable
                  cache: true
                  cache-dependency-path: go.sum

            - name: Setup Node
              uses: actions/setup-node@v6.4.0
              with:
                  node-version: "25"
                  cache: npm
                  cache-dependency-path: |
                      CEF_Payloads/package-lock.json
                      UI/package-lock.json

            - name: CEF deps
              working-directory: CEF_Payloads
              run: npm ci

            - name: CEF build
              working-directory: CEF_Payloads
              run: npm run build

            - name: UI deps
              working-directory: UI
              run: npm ci

            - name: UI build
              working-directory: UI
              env:
                  PUBLIC_DEV: "0"
                  PUBLIC_LOG_LEVEL: "info"
              run: npm run build

            - name: Install build tools
              if: matrix.target.os == 'ubuntu-latest' || matrix.target.os == 'ubuntu-24.04-arm'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      build-essential ninja-build cmake pkg-config just \
                      libwebkitgtk-6.0-dev libgtk-4-dev libx11-dev

            - name: Install build tools
              if: matrix.target.os == 'windows-latest'
              shell: pwsh
              run: |
                  winget install -e --id Casey.Just --accept-package-agreements --accept-source-agreements
                  winget install -e --id MartinStorsjo.LLVM-MinGW.UCRT --accept-package-agreements --accept-source-agreements
                  winget install -e --id Kitware.CMake --accept-package-agreements --accept-source-agreements

            - name: Version
              id: version
              shell: bash
              run: |
                  VERSION=$(git describe --tags --always)
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Build
              shell: bash
              env:
                  GOOS: ${{ matrix.target.goos }}
                  GOARCH: ${{ matrix.target.goarch }}
                  CGO_ENABLED: "1"
                  VERSION: ${{ steps.version.outputs.version }}
              run: |
                  just build Release

            - name: Build AppImage
              if: matrix.target.os == 'ubuntu-latest' || matrix.target.os == 'ubuntu-24.04-arm'
              shell: bash
              run: |
                  ARCH=$(uname -m)
                  curl -fsSL "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${ARCH}.AppImage" -o linuxdeploy
                  chmod +x linuxdeploy
                  export PATH="$PWD:$PATH"
                  ./build_appimage.sh

            - name: Create archive
              shell: bash
              run: |
                  cd dist
                  if [ "${{ matrix.target.os }}" = "windows-latest" ]; then
                    7z a -tzip "SISR-${{ matrix.target.name }}${{ inputs.artifact_suffix }}.zip" *
                  else
                    tar --exclude='./appimage' -czf "SISR-${{ matrix.target.name }}${{ inputs.artifact_suffix }}.tar.gz" .
                  fi
                  cd ..

            - name: Upload artifact
              if: ${{ inputs.upload_artifacts }}
              uses: actions/upload-artifact@v7.0.1
              with:
                  name: SISR-${{ matrix.target.name }}${{ inputs.artifact_suffix }}
                  path: |
                      dist/*.zip
                      dist/*.tar.gz
                  if-no-files-found: warn

            - name: Upload AppImage artifact
              if: ${{ inputs.upload_artifacts && (matrix.target.os == 'ubuntu-latest' || matrix.target.os == 'ubuntu-24.04-arm') }}
              uses: actions/upload-artifact@v7.0.1
              with:
                  name: SISR-${{ matrix.target.name }}-AppImage${{ inputs.artifact_suffix }}
                  path: dist/appimage/*.AppImage
                  if-no-files-found: warn
